services:
  backend:
    build: ./BE_PE/
    ports:
      - "8080:8080"

  db:
    image: postgres:18
    restart: "always"
    shm_size: 128mb

    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - postgres_data:/var/lib/postgresql

  adminer:
    image: dockette/adminerevo
    restart: "always"
    ports:
      - "8081:8080"

volumes:
  postgres_data:
